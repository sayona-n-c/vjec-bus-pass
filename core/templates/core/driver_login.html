{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Driver Login | VJEC Bus</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f1729;
            color: #e8eaf6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-box {
            background: #162040;
            border: 1px solid #2a3a70;
            border-radius: 20px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #f57c00, #ff9800);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 8px 24px rgba(245, 124, 0, 0.4);
        }

        .logo h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 800;
            color: #fff;
        }

        .logo p {
            color: #9fa8da;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #9fa8da;
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: #0f1729;
            border: 1px solid #2a3a70;
            border-radius: 10px;
            padding: 0.8rem 1rem;
            color: #e8eaf6;
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #7986cb;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #f57c00, #ff9800);
            color: #fff;
            border: none;
            padding: 0.95rem;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            box-shadow: 0 4px 16px rgba(245, 124, 0, 0.4);
            transition: all 0.25s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(245, 124, 0, 0.5);
        }

        .error-msg {
            background: rgba(198, 40, 40, 0.15);
            border: 1px solid rgba(198, 40, 40, 0.4);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            color: #ef9a9a;
            margin-bottom: 1rem;
        }

        .back-link {
            text-align: center;
            margin-top: 1.25rem;
            font-size: 0.85rem;
            color: #9fa8da;
        }

        .back-link a {
            color: #7986cb;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">
            <div class="logo-icon">🚌</div>
            <h2>Driver Login</h2>
            <p>VJEC Bus GPS Tracking System</p>
        </div>
        {% if messages %}
        {% for message in messages %}
        <div class="error-msg">{{ message }}</div>
        {% endfor %}
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" required placeholder="Enter your username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required
                    placeholder="••••••••" />
            </div>
            <button type="submit" class="btn-login">Login & Start Tracking</button>
        </form>
        <div class="back-link"><a href="/">← Back to main site</a></div>
    </div>
</body>

</html>
